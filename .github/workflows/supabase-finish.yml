name: Supabase Finish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Env vars via REST (slug) + redeploy
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SLUG: rafamacedolins-7646s-projects
        run: |
          set -uo pipefail
          API="https://api.supabase.com/v1"
          AUTH="Authorization: Bearer $SUPABASE_TOKEN"
          REF=$(curl -s -H "$AUTH" "$API/projects" | jq -r '.[] | select(.name=="a-body") | .id' | head -1)
          ANON=$(curl -s -H "$AUTH" "$API/projects/$REF/api-keys" | jq -r '.[] | select(.name=="anon") | .api_key')
          SUPA_URL="https://$REF.supabase.co"

          {
            echo "## Supabase Finish v2 — REST com slug"
            echo '```'
            echo "ref: $REF"

            echo "--- teste de autorizacao (GET project) ---"
            curl -s "https://api.vercel.com/v9/projects/a-body?slug=$SLUG" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.name // .error.message'

            echo "--- env add via REST ---"
            for PAIR in "VITE_SUPABASE_URL|$SUPA_URL" "VITE_SUPABASE_ANON_KEY|$ANON"; do
              K="${PAIR%%|*}"; V="${PAIR#*|}"
              R=$(curl -s -X POST "https://api.vercel.com/v10/projects/a-body/env?slug=$SLUG&upsert=true" \
                -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
                -d "{\"key\":\"$K\",\"value\":\"$V\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}")
              echo "$K: $(echo "$R" | jq -r 'if .error then .error.message else "ok" end')"
            done

            echo "--- redeploy ---"
            npm ci > /dev/null 2>&1
            npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tail -3

            echo "--- validacao: URL do Supabase embutida no bundle? ---"
            sleep 8
            BUNDLE=$(curl -s https://a-body.vercel.app/ | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            HITS=$(curl -s "https://a-body.vercel.app/$BUNDLE" | grep -c "$REF")
            echo "ocorrencias do ref no bundle: $HITS"
            echo '```'
          } | tee /tmp/report.md
          true

      - name: Publicar relatorio
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" -F body=@/tmp/report.md
