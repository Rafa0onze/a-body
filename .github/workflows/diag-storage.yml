name: Diag Storage

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnóstico e reparo do storage
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
        run: bash scripts/diag-storage.sh

      - name: Publicar relatorio
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" -F body=@/tmp/report.md
