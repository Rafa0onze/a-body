name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tee /tmp/deploy.log

      - name: Smoke test producao
        run: |
          sleep 10
          {
            echo "## Smoke test — a-body.vercel.app"
            echo '```'
            echo "--- GET / (frontend) ---"
            curl -s -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" https://a-body.vercel.app/
            echo "--- POST /api/claude (backend IA) ---"
            curl -s -X POST https://a-body.vercel.app/api/claude \
              -H "Content-Type: application/json" \
              -d '{"max_tokens":50,"messages":[{"role":"user","content":"Responda apenas: OK"}]}' | head -c 600
            echo ""
            echo '```'
          } | tee /tmp/report.md

      - name: Publicar diagnostico
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" -F body=@/tmp/report.md
