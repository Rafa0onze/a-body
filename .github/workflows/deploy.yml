name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set +e
          {
            echo "## Deploy Vercel — diagnostico"
            echo '```'
            echo "--- whoami ---"
            npx vercel@latest whoami --token="$VERCEL_TOKEN" 2>&1
            echo "--- deploy ---"
            npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1
            echo "exit_code: $?"
            echo '```'
          } | tee /tmp/report.md
          true

      - name: Publicar diagnostico
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" -F body=@/tmp/report.md
