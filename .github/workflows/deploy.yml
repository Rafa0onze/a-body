name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Diagnóstico + Deploy
        id: deploy
        run: |
          set +e
          WHO=$(npx vercel@latest whoami --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "WHOAMI: $WHO"
          OUT=$(npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          CODE=$?
          echo "$OUT"
          URL=$(echo "$OUT" | grep -oE 'https://[a-z0-9.-]+\.vercel\.app' | tail -1)
          {
            echo "REPORT<<EOD"
            echo "exit_code: $CODE"
            echo "whoami: $WHO"
            echo "url: ${URL:-NENHUMA}"
            echo "output_tail:"
            echo "$OUT" | tail -15
            echo "EOD"
          } >> "$GITHUB_OUTPUT"
          exit $CODE

      - name: Reportar resultado via commit comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="## Deploy Vercel — diagnóstico
\`\`\`
${{ steps.deploy.outputs.REPORT }}
\`\`\`"
