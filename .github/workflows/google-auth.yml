name: Configure Google Auth

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ativar provider Google no Supabase
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
          GID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GSECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          set -uo pipefail
          API="https://api.supabase.com/v1"
          AUTH="Authorization: Bearer $SUPABASE_TOKEN"
          REF=$(curl -s -H "$AUTH" "$API/projects" | jq -r '.[] | select(.name=="a-body") | .id' | head -1)

          {
            echo "## Google Auth — configuracao"
            echo '```'
            echo "ref: $REF"

            R=$(curl -s -X PATCH -H "$AUTH" -H "Content-Type: application/json" \
              "$API/projects/$REF/config/auth" \
              -d "{\"external_google_enabled\":true,\"external_google_client_id\":\"$GID\",\"external_google_secret\":\"$GSECRET\"}")
            echo "google enabled: $(echo "$R" | jq -r '.external_google_enabled // .message // "erro"')"

            echo "--- validacao: endpoint authorize deve redirecionar (302) para accounts.google.com ---"
            sleep 5
            LOC=$(curl -s -o /dev/null -w "%{http_code} %{redirect_url}" \
              "https://$REF.supabase.co/auth/v1/authorize?provider=google&redirect_to=https://a-body.vercel.app")
            echo "authorize: $LOC" | head -c 200
            echo ""
            echo '```'
          } | tee /tmp/report.md
          true

      - name: Publicar relatorio
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" -F body=@/tmp/report.md
