name: Supabase Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase + Vercel env
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash scripts/supabase-setup.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Redeploy com novas env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm ci
          {
            echo ""
            echo "--- redeploy ---"
            npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tail -5
          } >> /tmp/report.md

      - name: Publicar relatorio
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" -F body=@/tmp/report.md
